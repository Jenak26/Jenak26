<svg width="800" height="300" viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.4; }
    }
    @keyframes dash {
      to { stroke-dashoffset: -80; }
    }
    @keyframes radar {
      0% { r: 10; opacity: 0.6; }
      100% { r: 120; opacity: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes flow {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }
    .grid {
      stroke: #161b22;
      stroke-width: 1;
    }
    .glowing-radar {
      stroke: #00ffcc;
      stroke-width: 1.5;
      fill: none;
      transform-origin: 700px 150px;
      animation: radar 4s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
    }
    .heartbeat {
      stroke: #00ffcc;
      stroke-width: 2;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: flow 6s linear infinite;
      filter: url(#glow-cyan);
    }
    .cursor {
      animation: blink 1s step-end infinite;
      fill: #00ffcc;
    }
    .title {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 900;
      font-size: 46px;
      fill: #ffffff;
      letter-spacing: 5px;
      filter: url(#glow-white);
    }
    .subtitle {
      font-family: 'SF Mono', Consolas, Fira Code, monospace;
      font-size: 14px;
      fill: #8b949e;
      letter-spacing: 6px;
    }
    .hud-text {
      font-family: 'SF Mono', Consolas, Fira Code, monospace;
      font-size: 11px;
      fill: #58a6ff;
      opacity: 0.8;
    }
  </style>
  
  <defs>
    <!-- Cyan Glow Filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- White Glow Filter -->
    <filter id="glow-white" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070a" />
      <stop offset="100%" stop-color="#0c1017" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bg-grad)" rx="12" stroke="#30363d" stroke-width="1" />

  <!-- Grid System -->
  <g class="grid">
    <line x1="50" y1="0" x2="50" y2="300" />
    <line x1="100" y1="0" x2="100" y2="300" />
    <line x1="150" y1="0" x2="150" y2="300" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="250" y1="0" x2="250" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" />
    <line x1="350" y1="0" x2="350" y2="300" />
    <line x1="400" y1="0" x2="400" y2="300" />
    <line x1="450" y1="0" x2="450" y2="300" />
    <line x1="500" y1="0" x2="500" y2="300" />
    <line x1="550" y1="0" x2="550" y2="300" />
    <line x1="600" y1="0" x2="600" y2="300" />
    <line x1="650" y1="0" x2="650" y2="300" />
    <line x1="700" y1="0" x2="700" y2="300" />
    <line x1="750" y1="0" x2="750" y2="300" />
    
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="250" x2="800" y2="250" />
  </g>

  <!-- Oscilloscope Wave / Heartbeat (Neon Cyan) -->
  <path d="M 0 150 L 100 150 L 120 120 L 140 180 L 160 150 L 300 150 L 320 80 L 340 220 L 360 150 L 500 150 L 520 130 L 540 170 L 560 150 L 800 150" class="heartbeat" />

  <!-- Radar sonars (Centered at 700, 150) -->
  <circle cx="700" cy="150" r="40" class="glowing-radar" style="animation-delay: 0s;" />
  <circle cx="700" cy="150" r="40" class="glowing-radar" style="animation-delay: 1.33s;" />
  <circle cx="700" cy="150" r="40" class="glowing-radar" style="animation-delay: 2.66s;" />
  
  <!-- HUD System logs (Left corner) -->
  <text x="20" y="35" class="hud-text">SYS_INIT: SUCCESS</text>
  <text x="20" y="50" class="hud-text">PORT_LISTENER: 8080</text>
  <text x="20" y="65" class="hud-text">UPLINK: ACTIVE</text>
  <text x="20" y="255" class="hud-text">HOST: VIT_VELLORE</text>
  <text x="20" y="270" class="hud-text">KERNEL: YEAR_2_CS</text>

  <!-- Title Section -->
  <rect x="180" y="90" width="440" height="120" rx="6" fill="#0d1117" fill-opacity="0.9" stroke="#30363d" stroke-width="1.5" />
  <text x="400" y="145" text-anchor="middle" class="title">JANAK KABRA</text>
  <text x="400" y="185" text-anchor="middle" class="subtitle">CORE SOFTWARE ENGINEER</text>
  <rect x="585" y="125" width="4" height="25" class="cursor" />
</svg>
